<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>

body {

  font-family: sans-serif;

  max-width: 430px;

  margin: auto;

  padding: 12px;

  background: #f5f7fb;

}

.top-bar {

  display: flex;

  justify-content: center;

  gap: 6px;

}

.admin-btn {

  padding: 5px 10px;

  font-size: 12px;

  background: #333;

  color: #fff;

  border-radius: 8px;

  border: none;

}

.clear-btn { background: #ff5555; }

.admin-indicator {

  text-align: center;

  font-size: 11px;

  color: #ff4d6d;

  margin-bottom: 6px;

}

.input-card {

  background: #fff;

  padding: 14px;

  border-radius: 14px;

  margin: 10px 0;

  box-shadow: 0 4px 10px rgba(0,0,0,0.05);

  display: flex;

  flex-direction: column;

  align-items: center;

}

.input-card input,

.input-card textarea {

  width: 95%;

  margin: 6px 0;

  padding: 10px;

  border-radius: 10px;

  border: 1px solid #ddd;

}

button {

  width: 95%;

  padding: 10px;

  border-radius: 10px;

  border: none;

  background: #7aa2ff;

  color: #fff;

}

.post {

  position: relative;

  background: #fff;

  padding: 12px;

  margin: 10px 0;

  border-radius: 12px;

}

/* ❤️ 하트 */

.like-btn {

  position: absolute;

  right: 10px;

  top: 10px;

  width: 36px;

  height: 36px;

  border: none;

  background: none;

}

.heart {

  position: relative;

  width: 16px;

  height: 14px;

  margin: auto;

}

.heart::before,

.heart::after {

  content: "";

  position: absolute;

  width: 8px;

  height: 12px;

  border-radius: 8px 8px 0 0;

}

.heart::before { left: 8px; transform: rotate(-45deg); transform-origin: 0 100%; }

.heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }

.heart::before,

.heart::after { background: #bbb; }

.like-btn.liked .heart::before,

.like-btn.liked .heart::after { background: #ff4d6d; }

.like-btn.animate {

  animation: pop 0.2s ease;

}

@keyframes pop {

  0% { transform: scale(1); }

  50% { transform: scale(1.3); }

  100% { transform: scale(1); }

}

.like-count {

  font-size: 10px;

  text-align: center;

}

/* ❌ 삭제 버튼 (수정 완료 버전) */

.delete-btn {

  position: absolute;

  right: 10px;

  top: 48px;

  background: transparent;

  border: none;

  color: #ff4d6d;

  font-size: 14px;

  font-weight: bold;

  width: 36px;

  height: 36px;

  display: flex;

  align-items: center;

  justify-content: center;

  cursor: pointer;

}

</style>

<script>

var firebaseConfig = {

  apiKey: "AIzaSyBNXNBMBqxHmqAlxcdijdqGIcLkxODyl_0",

  authDomain: "test-edd0c.firebaseapp.com",

  projectId: "test-edd0c"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();

let userId = localStorage.getItem("userId");

if (!userId) {

  userId = "u_" + Math.random().toString(36).substr(2, 9);

  localStorage.setItem("userId", userId);

}

let isAdmin = localStorage.getItem("isAdmin") === "true";

const ADMIN_PASSWORD = "0624";

function renderTop() {

  const bar = document.getElementById("topBar");

  const indicator = document.getElementById("adminIndicator");

  if (isAdmin) {

    bar.innerHTML = `

      <button class="admin-btn" onclick="adminLogout()">로그아웃</button>

      <button class="admin-btn clear-btn" onclick="clearAll()">전체삭제</button>

    `;

    indicator.innerText = "관리자 모드 ON";

  } else {

    bar.innerHTML = `<button class="admin-btn" onclick="adminLogin()">관리자</button>`;

    indicator.innerText = "";

  }

}

function adminLogin() {

  if (prompt("비밀번호") === ADMIN_PASSWORD) {

    localStorage.setItem("isAdmin", "true");

    location.reload();

  }

}

function adminLogout() {

  localStorage.removeItem("isAdmin");

  location.reload();

}

function clearAll() {

  if (!confirm("전체 삭제할까?")) return;

  db.collection("guestbook").get().then(snap=>{

    snap.forEach(doc=>doc.ref.delete());

  });

}

function add() {

  let name = document.getElementById('name').value || "익명";

  let msg = document.getElementById('msg').value;

  if (!msg.trim()) return;

  db.collection("guestbook").add({ name, msg, userId, date: Date.now() });

  document.getElementById('name').value='';

  document.getElementById('msg').value='';

}

function like(id, btn) {

  const ref = db.collection("guestbook").doc(id).collection("likes").doc(userId);

  ref.get().then(doc=>{

    if(doc.exists) ref.delete();

    else ref.set({});

  });

  btn.classList.add("animate");

  setTimeout(()=>btn.classList.remove("animate"),200);

}

function del(id) {

  if (!confirm("삭제할까?")) return;

  db.collection("guestbook").doc(id).delete();

}

function formatDate(t) {

  return new Date(t).toLocaleString('ko-KR',{

    year:'numeric',month:'2-digit',day:'2-digit',

    hour:'2-digit',minute:'2-digit',hour12:false

  });

}

db.collection("guestbook").orderBy("date","desc")

.onSnapshot(snap=>{

  renderTop();

  const list=document.getElementById("list");

  list.innerHTML="";

  snap.forEach(doc=>{

    const d=doc.data();

    const canDelete = isAdmin || d.userId===userId;

    list.innerHTML+=`

    <div class="post">

      <b>${d.name}</b><br>

      <small>${formatDate(d.date)}</small><br><br>

      ${d.msg}

      <button class="like-btn" onclick="like('${doc.id}', this)">

        <div class="heart"></div>

        <span class="like-count" id="c-${doc.id}">0</span>

      </button>

      ${canDelete ? `<button class="delete-btn" onclick="del('${doc.id}')">X</button>` : ""}

    </div>

    `;

    db.collection("guestbook").doc(doc.id).collection("likes")

    .onSnapshot(s=>{

      document.getElementById("c-"+doc.id).innerText = s.size;

    });

  });

});

window.onload = renderTop;

</script>

</head>

<body>

<div class="admin-indicator" id="adminIndicator"></div>

<div class="top-bar" id="topBar"></div>

<div class="input-card">

  <input id="name" placeholder="이름">

  <textarea id="msg" rows="3" placeholder="내용"></textarea>

  <button onclick="add()">작성</button>

</div>

<div id="list"></div>

</body>

</html>
